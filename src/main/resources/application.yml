spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gamesearch
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /api/api-docs
  swagger-ui:
    path: /swagger/index.html

gamesearch:
  security:
    secret: "secret-word"
